name: Docker Image bauen und veröffentlichen

on:
  push:
    branches: ["main"]
    # Versionierte Releases: Git-Tag "vX.Y.Z" pushen (z.B. `git tag v1.0.0 &&
    # git push origin v1.0.0`) -> erzeugt gepinnte Image-Tags 1.0.0 / 1.0 / 1.
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Feste, kleingeschriebene Image-Namen (Docker/OCI erlaubt keine Grossbuch-
  # staben) statt sich auf ${{ github.repository }} zu verlassen.
  IMAGE_OWNER: jaithn
  IMAGE_NAME: nuola-energy-dashboard
  # Basis-Version fuer automatische Versionsnummern. Der Patch-Teil ist die
  # fortlaufende GitHub-Action-Lauf-Nummer -> jeder main-Push erzeugt ohne
  # manuelles Git-Tag eine echte, aufsteigende Versionsnummer.
  VERSION_MAJOR_MINOR: "1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Image-Beschreibung (org.opencontainers.image.description): kurzer
      # Produkttext + „Neu in dieser Version" aus der obersten CHANGELOG-Sektion,
      # zu einer Zeile verdichtet. Erscheint auf der GHCR-Package-Seite.
      - name: Image-Beschreibung aus CHANGELOG bauen
        id: desc
        run: |
          PROD="Nuola Energy Dashboard – Web-App der Nuola Solar GbR zur mieterbezogenen Stromabrechnung über Shelly Pro 3EM (Gebäudestromanlage nach § 42b EnWG): Interessenten-Onboarding, versionierte Verträge und § 14 UStG-konforme Jahres-/Schlussrechnungen als PDF."
          NEU=$(awk '/^## /{n++} n==1' CHANGELOG.md | sed 's/^## /Neu: /; s/^- /– /' | tr '\n' ' ' | sed 's/  */ /g; s/ *$//' | cut -c1-350)
          echo "value=${PROD} ${NEU}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Anzeige-Version fuer die App bestimmen (wird im Admin unter "Version"
      # angezeigt und muss den GitHub-/Image-Versionen entsprechen):
      #  - Release-Tag vX.Y.Z -> "X.Y.Z"
      #  - main-Push          -> "<VERSION_MAJOR_MINOR>.<lauf-nr>"
      - name: App-Version bestimmen
        id: appversion
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${VERSION_MAJOR_MINOR}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          # Tag-Strategie:
          #  - main-Push:      "latest", "1.0.<lauf-nr>" (automatische Version),
          #                    "main", "sha-<commit>"
          #  - Git-Tag vX.Y.Z: "X.Y.Z", "X.Y", "X" (manuell gepinnte Releases)
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION_MAJOR_MINOR }}.${{ github.run_number }},enable={{is_default_branch}}
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          # Überschreibt die Default-Beschreibung (aus der Repo-Beschreibung) mit
          # Produkttext + „Neu in dieser Version" aus dem CHANGELOG.
          labels: |
            org.opencontainers.image.description=${{ steps.desc.outputs.value }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.appversion.outputs.value }}
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
