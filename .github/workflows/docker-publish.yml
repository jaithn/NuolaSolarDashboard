name: Docker Image bauen und veröffentlichen

on:
  push:
    branches: ["main"]
    # Versionierte Releases: Git-Tag "vX.Y.Z" pushen (z.B. `git tag v1.0.0 &&
    # git push origin v1.0.0`) -> erzeugt gepinnte Image-Tags 1.0.0 / 1.0 / 1.
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Feste, kleingeschriebene Image-Namen (Docker/OCI erlaubt keine Grossbuch-
  # staben) statt sich auf ${{ github.repository }} zu verlassen.
  IMAGE_OWNER: jaithn
  IMAGE_NAME: nuola-energy-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          # Tag-Strategie:
          #  - main-Push:      "main", "sha-<commit>", "latest" (rollendes Dev-Image)
          #  - Git-Tag vX.Y.Z: "X.Y.Z", "X.Y", "X" (gepinnte, stabile Releases)
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
