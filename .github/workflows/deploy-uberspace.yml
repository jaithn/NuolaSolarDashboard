name: Deploy auf Uberspace

# Alternativer Betriebsweg NEBEN dem Docker-Image (docker-publish.yml):
# Baut die App in GitHub Actions und spielt sie per rsync auf einen Uberspace-
# Host der "Asteroid"-Generation. Die Dienste laufen dort als systemd-User-
# Services (nicht supervisord); der Neustart erfolgt per `systemctl --user`.
# Die plattformspezifischen Prisma-Engines werden bewusst NICHT in CI, sondern
# nach dem Transfer auf dem Host erzeugt (prisma generate), damit die zur
# Uberspace-Plattform passende Query-Engine verwendet wird.
#
# Einrichtung/Details: siehe deploy/uberspace/README.md
#
# Benoetigte GitHub-Secrets (Repo → Settings → Secrets and variables → Actions):
#   UBERSPACE_SSH_KEY  privater SSH-Schluessel (ganze Datei, inkl. Header/Footer)
#   UBERSPACE_HOST     z.B. "andromeda.uberspace.de"
#   UBERSPACE_USER     der Uberspace-Benutzername
#   UBERSPACE_PATH     Ziel-Verzeichnis auf dem Host, z.B. "/home/isabell/nuola"

on:
  # Bewusst NUR manuell bzw. per Tag ausloesbar, damit nicht jeder main-Push
  # gleichzeitig Docker UND Uberspace deployt. Wer bei jedem Push deployen will,
  # kann den push-Trigger unten einkommentieren.
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: deploy-uberspace
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle Historie fuer `git describe` (Anzeige-Version)

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          # Muss zur Node-Version des Uberspace-Hosts passen (Asteroid stellt
          # die System-Node fest bereit, aktuell 26 unter /usr/bin/node und
          # NICHT via `uberspace tool` umstellbar) - Build- = Laufzeit-Version.
          node-version: "26"
          cache: "npm"

      - name: Abhaengigkeiten installieren
        # --legacy-peer-deps: wie im Dockerfile (recharts listet React 19 noch
        # nicht in peerDependencies).
        run: npm ci --legacy-peer-deps

      - name: Prisma-Client generieren (fuer den Build)
        run: npx prisma generate

      - name: Anzeige-Version ermitteln
        id: version
        run: |
          echo "app_version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Next.js-Build
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ steps.version.outputs.app_version }}
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_DATE: ${{ steps.version.outputs.build_date }}
        run: npm run build

      - name: SSH-Key laden
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UBERSPACE_SSH_KEY }}

      - name: Host-Key vertrauen
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.UBERSPACE_HOST }}" >> ~/.ssh/known_hosts

      - name: Code uebertragen (rsync)
        # Anker (fuehrender /) beziehen sich auf das Transfer-Wurzelverzeichnis.
        # --delete raeumt geloeschte Dateien auf dem Host auf; die Ausschluesse
        # schuetzen Laufzeit-/Kundendaten (data/ = SQLite + Rechnungs-PDFs),
        # die lokale .env und die hochgeladenen Logos (public/uploads).
        run: |
          rsync -az --delete \
            --exclude='/.git' \
            --exclude='/.github' \
            --exclude='/data' \
            --exclude='/.env' \
            --exclude='/public/uploads' \
            --exclude='/.next/cache' \
            --exclude='/tests' \
            --exclude='/coverage' \
            ./ "${{ secrets.UBERSPACE_USER }}@${{ secrets.UBERSPACE_HOST }}:${{ secrets.UBERSPACE_PATH }}/"

      - name: Migration, Textsync & Neustart auf dem Host
        # prisma generate laeuft HIER (nicht in CI), damit die Query-Engine zur
        # Uberspace-Plattform passt. db push wendet Schemaaenderungen an (bewusst
        # ohne --accept-data-loss). Danach Vertrags-/Brieftexte einlesen und die
        # systemd-User-Dienste neu starten (Asteroid; die Units muessen einmalig
        # per `uberspace service add` angelegt sein, siehe deploy/uberspace/README.md).
        run: |
          ssh "${{ secrets.UBERSPACE_USER }}@${{ secrets.UBERSPACE_HOST }}" bash -s <<'REMOTE'
          set -euo pipefail
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          cd "${{ secrets.UBERSPACE_PATH }}"
          set -a; [ -f .env ] && . ./.env; set +a
          ./node_modules/.bin/prisma generate
          ./node_modules/.bin/prisma db push --skip-generate
          ./node_modules/.bin/tsx scripts/sync-dokumente.ts || true
          systemctl --user restart nuola-web nuola-worker
          systemctl --user --no-pager status nuola-web nuola-worker || true
          REMOTE
