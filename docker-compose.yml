services:
  nuola-mieter-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuola-mieter-dashboard
    restart: unless-stopped
    ports:
      # Nur auf localhost binden: die App ist ausschliesslich ueber den
      # vorgelagerten nginx erreichbar, nicht direkt aus dem Internet/LAN.
      # (Falls nginx auf einem ANDEREN Host laeuft: auf die interne IP
      # des nginx-Hosts einschraenken statt 127.0.0.1.)
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    volumes:
      - nuola-mieter-dashboard-data:/app/data
      - nuola-mieter-dashboard-uploads:/app/public/uploads

volumes:
  nuola-mieter-dashboard-data:
  nuola-mieter-dashboard-uploads:
