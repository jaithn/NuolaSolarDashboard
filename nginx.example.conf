# ---------------------------------------------------------------------------
# nginx-Vorlage fuer das Nuola Energy Dashboard
#
# Der vorgelagerte nginx terminiert TLS und leitet an den Container weiter,
# der ausschliesslich auf 127.0.0.1:3000 lauscht (siehe docker-compose.yml).
#
# Vorbereitung:
#   1. Domain unten (server_name) auf die echte Domain aendern.
#   2. TLS-Zertifikat besorgen, z.B. per Certbot:
#        sudo certbot --nginx -d mieterportal.example.com
#      (Certbot traegt ssl_certificate/ssl_certificate_key dann selbst ein.)
#   3. Diese Datei nach /etc/nginx/sites-available/ kopieren, in
#      /etc/nginx/sites-enabled/ verlinken, dann:  sudo nginx -t && sudo systemctl reload nginx
# ---------------------------------------------------------------------------

# HTTP -> HTTPS Weiterleitung (und ACME-Challenge fuer Certbot durchlassen).
server {
    listen 80;
    listen [::]:80;
    server_name mieterportal.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mieterportal.example.com;

    # --- TLS ---------------------------------------------------------------
    # Diese beiden Zeilen setzt Certbot automatisch; bei manuellem Zertifikat
    # hier die Pfade eintragen.
    ssl_certificate     /etc/letsencrypt/live/mieterportal.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mieterportal.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS gehoert hierher (nicht in die App): TLS wird an dieser Stelle
    # terminiert. Erst aktivieren, wenn HTTPS zuverlaessig laeuft - der
    # Header ist fuer 2 Jahre bindend und schwer zurueckzunehmen.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Upload-Groesse begrenzen: das Dashboard nimmt nur kleine Logo-Uploads
    # (Logo-Limit in der App = 2 MB) entgegen. 5m gibt etwas Puffer.
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WICHTIG: Die App wertet die Client-IP aus X-Forwarded-For aus
        # (Rate-Limiter/Brute-Force-Schutz). nginx setzt hier die ECHTE
        # Remote-Adresse als letzten Eintrag - der App-Code nimmt bewusst
        # den aeussersten (letzten) Wert, dem allein zu trauen ist.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # WebSocket-/Upgrade-Support (Next.js Dev-HMR bzw. kuenftige
        # Realtime-Funktionen) - im Prod-Betrieb unschaedlich.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
